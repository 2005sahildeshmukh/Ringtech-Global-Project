<!DOCTYPE html>
<html lang="en" class="scroll-smooth overflow-x-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Ring Tech Global</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./assets/css/style.css">
    <style>
        #navbar { background-color: #0a192f !important; border-bottom: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="selection:bg-blue-500/30 bg-[#0a192f] overflow-x-hidden flex flex-col min-h-screen w-full text-white">

    <nav id="navbar" class="fixed w-full z-50 transition-all duration-300 bg-[#0a192f] py-4">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-white tracking-tight">Ring<span class="text-blue-400">TechGlobal</span></a>
            <div class="hidden md:flex items-center space-x-6">
                <a href="products.html" class="text-slate-200 hover:text-white text-sm font-semibold transition-colors">Products</a>
                
                <a href="contact.html" class="relative text-slate-300 hover:text-white transition-colors p-2" title="View Quote List">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                    <span class="cart-badge absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center" style="display: none;">0</span>
                </a>

                <a href="contact.html" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-full text-sm font-bold transition-all shadow-md">Contact Us</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow pt-32 pb-24 relative overflow-hidden">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
            
            <nav class="text-sm font-medium text-slate-400 mb-8">
                <a href="index.html" class="hover:text-blue-400">Home</a> > 
                <span id="breadcrumb-category" class="text-slate-400">Category</span> > 
                <span id="breadcrumb-brand" class="text-white">Brand</span>
            </nav>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 mb-12 items-start">
                
                <div class="bg-white rounded-3xl p-10 flex items-center justify-center shadow-2xl aspect-square relative">
                    <img id="product-image" src="" alt="Product Image" class="max-w-full max-h-full object-contain mix-blend-multiply">
                </div>

                <div class="flex flex-col justify-center pt-4">
                    <h1 id="product-title" class="text-4xl md:text-5xl font-extrabold text-white tracking-tight mb-4">Loading...</h1>
                    <p id="product-subtitle" class="text-slate-400 text-lg mb-6"></p>
                    
                    <div class="flex items-center text-xs font-bold tracking-widest text-blue-400 uppercase mb-10">
                        <svg class="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
                        <span id="product-tags">Brand, Category</span>
                    </div>

                    <div class="border-t border-white/10 pt-8 space-y-4">
                        <button id="add-to-quote-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-500/30 flex justify-center items-center group">
                            <span>Get Quote</span>
                            <svg class="w-5 h-5 ml-2 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </button>
                    </div>
                </div>
            </div>

            <div class="bg-[#112240] border border-white/10 rounded-2xl overflow-hidden">
                <div class="flex border-b border-white/10">
                    <button class="px-8 py-4 bg-blue-600 text-white font-bold text-sm">Description</button>
                </div>
                
                <div class="p-8 md:p-12 relative">
                    <p id="product-description" class="text-slate-300 leading-relaxed mb-10 relative z-10"></p>

                    <h4 class="text-white font-bold text-lg mb-6 flex items-center relative z-10">
                        <span class="w-6 h-1 bg-blue-500 mr-3 rounded-full"></span>
                        Technical Specifications
                    </h4>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-y-4 gap-x-12 relative z-10" id="product-specs">
                        </div>
                </div>
            </div>

        </div>
    </main>

    <script src="./assets/js/quote.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadProductDetails);
    </script>
</body>
</html>
